name: Deploy live site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lucent-solutions-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='designsystem.md' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Run deploy script on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '${{ secrets.VPS_APP_DIR }}' && chmod +x scripts/deploy-live.sh && TARGET_DIR='${{ secrets.VPS_DEPLOY_DIR }}' ./scripts/deploy-live.sh"
